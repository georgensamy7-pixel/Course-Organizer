<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Course</title>
    <link rel="stylesheet" href="art.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Personal Course Organizer</h1>
        <h4>Keep your academic schedule updated</h4>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="add courses.html">Add Courses</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <div class="content">
        <h2>Add a New Course 📝</h2>
        <form action="courses.html" method="GET">
            
            <p>Course Name:</p>
            <input type="text" name="course-name" placeholder="e.g. Data Structures" required>

            <p>Instructor:</p>
            <input type="text" name="instructor" placeholder="Enter instructor name" required>

            <p>Credit Hours:</p>
            <input type="number" name="credit-hours" placeholder="e.g. 3" min="1" max="5">

            <p>Notes:</p>
            <textarea name="notes" rows="4" placeholder="Any additional details..."></textarea>

            <br><br>
            <button type="submit">Add Course Now</button>
        </form>
    </div>

    <footer>
        <p>Copyright © 2026 Personal Course Organizer. All rights reserved.</p>
    </footer>
</div>

</body>
</html>
